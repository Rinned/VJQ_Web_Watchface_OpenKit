<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=360,user-scalable=no"><style>html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}canvas{position:fixed;left:-20px;top:-20px;width:400px;height:400px;background:#000;display:block}</style></head><body><canvas id="face" width="400" height="400"></canvas><script>var c=document.getElementById('face'),x=c.getContext('2d');x.fillStyle='#000';x.fillRect(0,0,400,400);x.strokeStyle='#756644';x.lineWidth=1;x.beginPath();x.arc(200,200,176,0,Math.PI*2);x.stroke();</script></body></html>
