<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=360,user-scalable=no"><style>html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}canvas{position:fixed;left:0;top:0;width:360px;height:360px;background:#000;display:block}</style></head><body><canvas id="face" width="360" height="360"></canvas><script>(function(){var cfg={"kind":"filled","radius":176},c=document.getElementById('face'),ctx=c.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,360,360);ctx.strokeStyle='#756644';ctx.fillStyle='#756644';ctx.lineCap='round';ctx.lineJoin='round';if(cfg.kind==='circle'){ctx.lineWidth=cfg.width;ctx.beginPath();ctx.arc(180,180,cfg.radius,0,Math.PI*2);ctx.stroke();}else if(cfg.kind==='dots'){for(var i=0;i<60;i++){var a=(i*6-90)*Math.PI/180,r=cfg.radius,x=180+Math.cos(a)*r,y=180+Math.sin(a)*r;ctx.beginPath();ctx.arc(x,y,(i%5===0?2.2:1.4),0,Math.PI*2);ctx.fill();}}else if(cfg.kind==='filled'){ctx.beginPath();ctx.arc(180,180,cfg.radius,0,Math.PI*2);ctx.fill();}})();</script></body></html>
