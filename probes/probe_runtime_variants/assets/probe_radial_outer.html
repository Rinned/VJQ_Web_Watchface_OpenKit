<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=360,user-scalable=no"><style>html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}canvas{position:fixed;left:0;top:0;width:360px;height:360px;background:#000;display:block}</style></head><body><canvas id="face" width="360" height="360"></canvas><script>(function(){var cfg={"scale":1.03,"proc":true,"radialMin":156,"radialAlpha":220,"opaque":true};var c=document.getElementById('face'),ctx=c.getContext('2d');function process(im){var oc=document.createElement('canvas');oc.width=im.width;oc.height=im.height;var o=oc.getContext('2d');o.drawImage(im,0,0);if(!cfg.proc)return oc;try{var id=o.getImageData(0,0,oc.width,oc.height),d=id.data,cx=oc.width/2,cy=oc.height/2;for(var y=0;y<oc.height;y++){for(var x=0;x<oc.width;x++){var i=(y*oc.width+x)*4,a=d[i+3];if(!a)continue;var dx=x+.5-cx,dy=y+.5-cy,r=Math.sqrt(dx*dx+dy*dy);var drop=false;if(cfg.radius&&r>cfg.radius)drop=true;if(cfg.alpha&&a<cfg.alpha)drop=true;if(cfg.radialMin&&r>cfg.radialMin&&a<cfg.radialAlpha)drop=true;if(drop){d[i]=0;d[i+1]=0;d[i+2]=0;d[i+3]=0}else if(cfg.opaque){d[i+3]=255}}}o.putImageData(id,0,0);}catch(e){}return oc}function draw(src){ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,360,360);ctx.fillStyle='#000';ctx.fillRect(0,0,360,360);ctx.save();ctx.imageSmoothingEnabled=false;if(cfg.scale&&cfg.scale!==1){ctx.translate(180,180);ctx.scale(cfg.scale,cfg.scale);ctx.drawImage(src,-180,-180,360,360)}else ctx.drawImage(src,0,0,360,360);ctx.restore()}var im=new Image();im.onload=function(){draw(process(im));};im.src='p00.png';})();</script></body></html>
