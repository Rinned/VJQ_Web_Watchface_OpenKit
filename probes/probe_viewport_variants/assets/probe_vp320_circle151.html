<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=320,user-scalable=no"><style>html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}canvas{position:fixed;left:0;top:0;width:320px;height:320px;background:#000;display:block}</style></head><body><canvas id="face" width="320" height="320"></canvas><script>var c=document.getElementById('face'),x=c.getContext('2d');x.fillStyle='#000';x.fillRect(0,0,320,320);x.strokeStyle='#756644';x.lineWidth=1;x.beginPath();x.arc(160,160,151,0,Math.PI*2);x.stroke();</script></body></html>
