<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=360,user-scalable=no">
  <style>
    html, body { margin:0; width:100%; height:100%; background:#000; overflow:hidden; }
    canvas{position:fixed;left:50%;top:50%;width:360px;height:360px;margin-left:-180px;margin-top:-180px;display:block;background:#000;}
  </style>
</head>
<body>
<canvas id="c" width="360" height="360"></canvas>
<script>
(function() {
  var c = document.getElementById("c");
  var ctx = c.getContext("2d");
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 360, 360);
  ctx.strokeStyle = "rgba(117,102,68,1)";
  ctx.lineWidth = 1;
  ctx.lineCap = "butt";
  
      var o=document.createElement("canvas"),ox=o.getContext("2d");
      o.width=360;o.height=360;
      ox.fillStyle="#000";ox.fillRect(0,0,360,360);
      ox.strokeStyle="rgba(117,102,68,1)";ox.lineWidth=1;
      ox.beginPath();ox.arc(180,180,176,0,Math.PI*2);ox.stroke();
      ctx.globalCompositeOperation="copy";
      ctx.drawImage(o,0,0);
    
})();
</script>
</body>
</html>
