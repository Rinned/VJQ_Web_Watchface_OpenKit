<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=320,user-scalable=no">
  <style>
    html, body { margin:0; width:100%; height:100%; background:#000; overflow:hidden; }
    #wrap{position:fixed;left:50%;top:50%;width:320px;height:320px;margin-left:-160px;margin-top:-160px;background:#000;overflow:hidden;transform:scale(1.125);transform-origin:center center;}canvas{display:block;background:#000;}
  </style>
</head>
<body>
<div id="wrap"><canvas id="c" width="320" height="320"></canvas></div>
<script>
(function(){
  var c=document.getElementById("c"),ctx=c.getContext("2d");
  ctx.fillStyle="#000";ctx.fillRect(0,0,320,320);
  ctx.strokeStyle="rgba(117,102,68,1)";ctx.lineWidth=1;ctx.beginPath();
  ctx.arc(160,160,156.5,0,Math.PI*2);ctx.stroke();
})();
</script>
</body>
</html>
