<!doctype html>
<html>
<head>

  <style>
    html, body { margin:0; width:100%; height:100%; background:#000; overflow:hidden; }
    canvas{position:fixed;left:50%;top:50%;width:360px;height:360px;margin-left:-180px;margin-top:-180px;display:block;background:#000;}
  </style>

<body>
<canvas id="c" width="360" height="360"></canvas>
<script>
(function() {
  var c = document.getElementById("c");
  var ctx = c.getContext("2d");
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 360, 360);
  ctx.strokeStyle = "rgba(117,102,68,1)";
  ctx.lineWidth = 1;
  ctx.lineCap = "butt";
  
      c.width=720;c.height=720;c.style.width="360px";c.style.height="360px";
      ctx = c.getContext("2d");
      ctx.scale(2,2);
      ctx.fillStyle="#000";ctx.fillRect(0,0,360,360);
      ctx.strokeStyle="rgba(117,102,68,1)";ctx.lineWidth=1;ctx.lineCap="butt";
      ctx.beginPath();ctx.arc(180,180,176,0,Math.PI*2);ctx.stroke();
    
})();

</body>
</html>
