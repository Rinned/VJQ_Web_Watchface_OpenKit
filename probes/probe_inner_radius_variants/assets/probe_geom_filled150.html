<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=360,user-scalable=no"><style>html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}canvas{position:fixed;left:0;top:0;width:360px;height:360px;background:#000;display:block}</style></head><body><canvas id="face" width="360" height="360"></canvas><script>var c=document.getElementById('face'),x=c.getContext('2d');x.fillStyle='#000';x.fillRect(0,0,360,360);x.strokeStyle='#756644';x.fillStyle='#756644';x.lineWidth=1;x.beginPath();x.arc(180,180,150,0,Math.PI*2);x.fill();</script></body></html>
